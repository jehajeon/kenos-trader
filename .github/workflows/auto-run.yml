name: KENOS 자동 AI 분석 (시장 시간 매시간)

# Scenario C — 시장 시간 매시간 분석 (평일 8회/일 + 일요일 리뷰).
# 시점 (ET): 09:00 · 10:00 · 11:00 · 12:00 · 13:00 · 14:00 · 15:00 · 15:30
#            + Sunday 20:00 ET (분석만, 주문 없음)
#
# DST/Standard 양쪽 UTC 커버:
#   - DST(UTC-4) 9 AM~3 PM ET = 13~19 UTC
#   - Standard(UTC-5) 9 AM~3 PM ET = 14~20 UTC
#   합집합: 13~20 UTC 매시간 (8슬롯) → endpoint가 ET ±5분 검증해 진짜 윈도우만 실행
#
# 15:30 ET는 추가 cron으로 별도 처리 (19:30/20:30 UTC).

on:
  schedule:
    # 매시간 — 13:00 ~ 20:00 UTC (평일)
    # DST: 09:00 ~ 16:00 ET 커버 / Standard: 08:00 ~ 15:00 ET 커버
    # 윈도우 외 firing은 endpoint가 즉시 skip
    - cron: '0 13-20 * * 1-5'
    # 15:30 ET pre-close 슬롯 (DST + Standard)
    - cron: '30 19 * * 1-5'   # DST 15:30 ET
    - cron: '30 20 * * 1-5'   # Standard 15:30 ET / DST 16:30 ET (윈도우 밖 → skip)
    # 일요일 20:00 ET 주간 리뷰 (DST + Standard)
    - cron: '0 0 * * 1'       # DST: Sun 20:00 ET
    - cron: '0 1 * * 1'       # Standard: Sun 20:00 ET
  workflow_dispatch:           # 수동 트리거

jobs:
  auto-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: KENOS 자동 분석 트리거
        run: |
          response=$(curl -X POST "${{ secrets.VERCEL_URL || 'https://kenos-trader.vercel.app' }}/api/auto-run" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 120 \
            --silent --show-error --write-out "\nHTTP_STATUS:%{http_code}")
          echo "$response"
          status=$(echo "$response" | grep -oE "HTTP_STATUS:[0-9]+" | cut -d: -f2)
          if [ "$status" != "200" ]; then
            echo "::error::auto-run returned HTTP $status"
            exit 1
          fi
